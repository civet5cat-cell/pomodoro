<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="番茄钟">
<title>番茄钟</title>
<style>
:root {
  --bg: #0a0a0a;
  --text: #ede8e0;
  --dim: rgba(237,232,224,0.30);
  --mid: rgba(237,232,224,0.55);
  --accent: #c8b87a;
  --border: rgba(237,232,224,0.08);
  --surface: rgba(237,232,224,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Courier New',monospace; overflow:hidden; user-select:none; }

/* ── AMBIENT ── */
#amb { position:fixed; inset:0; pointer-events:none; z-index:0; }
.orb { position:absolute; border-radius:50%; filter:blur(140px); opacity:0.08; transition:background 3s ease; }
.o1 { width:80vw; height:80vw; top:-20vw; left:-20vw; }
.o2 { width:55vw; height:55vw; bottom:-10vw; right:-10vw; }

/* ── MAIN ── */
#main { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }

#countdown {
  font-family:'Courier New',monospace;
  font-weight:300;
  font-size:clamp(36px, 6vw, 72px);
  letter-spacing:0.12em;
  color:rgba(237,232,224,0.42);
  margin-bottom:clamp(24px,4vh,52px);
  transition:color 2s;
}

#session-range {
  font-family:'Courier New',monospace;
  font-weight:300;
  font-size:clamp(12px,1.8vw,18px);
  letter-spacing:0.22em;
  color:var(--dim);
  margin-bottom:clamp(20px,3.5vh,44px);
  transition:color 2s;
}

/* ── FLOATING LABEL ── */
#label-wrap {
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  max-width:90vw;
  gap:0;
}

.fl-char {
  font-family:Georgia,serif;
  font-style:italic;
  font-weight:300;
  font-size:clamp(72px,14vw,160px);
  line-height:1;
  color:var(--accent);
  transition:color 1.5s ease;
  display:inline-block;
  will-change:transform;
}

/* ── TOP BAR ── */
#topbar { position:fixed; top:0; left:0; right:0; padding:24px 32px; display:flex; justify-content:flex-end; z-index:20; }

.btn-pill {
  background:none; border:1px solid var(--border); color:var(--dim);
  padding:8px 20px; border-radius:24px;
  font-family:'Courier New',monospace; font-size:11px; letter-spacing:0.12em;
  cursor:pointer; transition:all 0.25s;
}
.btn-pill:hover { border-color:var(--accent); color:var(--accent); }

/* ── BREAK OVERLAY ── */
#break-overlay {
  position:fixed; inset:0; background:rgba(10,10,10,0.95);
  z-index:80; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  opacity:0; pointer-events:none; transition:opacity 0.5s;
}
#break-overlay.show { opacity:1; pointer-events:all; }
.break-emoji { font-size:56px; animation:sway 2s ease-in-out infinite alternate; }
@keyframes sway { from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }
.break-title { font-family:Georgia,serif; font-style:italic; font-size:clamp(28px,5vw,44px); font-weight:300; }
.break-sub { font-size:12px; color:var(--dim); letter-spacing:0.18em; text-transform:uppercase; }
.btn-dismiss {
  margin-top:12px; background:none; border:1px solid var(--border); color:var(--mid);
  padding:12px 36px; border-radius:30px;
  font-family:'Courier New',monospace; font-size:12px; letter-spacing:0.12em; cursor:pointer; transition:all 0.25s;
}
.btn-dismiss:hover { border-color:var(--text); color:var(--text); }

/* ── TRANSITION FLASH ── */
#trans-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:70;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  opacity:0; pointer-events:none; transition:opacity 0.4s;
}
#trans-overlay.show { opacity:1; }
.trans-sub { font-size:11px; letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; }
.trans-label { font-family:Georgia,serif; font-style:italic; font-size:clamp(36px,7vw,64px); font-weight:300; }

/* ── SETTINGS PANEL ── */
#settings {
  position:fixed; inset:0; background:var(--bg); z-index:50;
  opacity:0; pointer-events:none; transition:opacity 0.35s;
  display:flex; flex-direction:column;
}
#settings.open { opacity:1; pointer-events:all; }

.sp-head {
  padding:28px 36px 20px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.sp-title { font-family:Georgia,serif; font-style:italic; font-size:26px; font-weight:300; }
.btn-x {
  background:none; border:1px solid var(--border); color:var(--dim);
  width:34px; height:34px; border-radius:50%; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.btn-x:hover { border-color:#e87a7a; color:#e87a7a; }

.sp-body { flex:1; overflow-y:auto; padding:24px 36px 60px; -webkit-overflow-scrolling:touch; }

.sp-sec { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); margin:28px 0 14px; }
.sp-sec:first-child { margin-top:0; }

.s-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px 18px; display:flex; align-items:center; gap:14px; margin-bottom:8px;
}
.s-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.s-info { flex:1; min-width:0; }
.s-name { font-family:Georgia,serif; font-style:italic; font-size:18px; font-weight:300; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.s-time { font-size:10px; color:var(--dim); letter-spacing:0.08em; margin-top:2px; }
.s-btns { display:flex; gap:6px; }
.s-btn {
  background:none; border:1px solid var(--border); color:var(--dim);
  width:30px; height:30px; border-radius:6px; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.s-btn:hover { border-color:#e87a7a; color:#e87a7a; }
.s-btn.edit:hover { border-color:var(--accent); color:var(--accent); }

.add-form {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:18px; display:flex; flex-direction:column; gap:12px;
}
.f-row { display:flex; gap:10px; }
.f-group { flex:1; display:flex; flex-direction:column; gap:5px; }
.f-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); }
.f-input {
  background:var(--bg); border:1px solid var(--border); border-radius:7px;
  padding:9px 13px; color:var(--text); font-family:'Courier New',monospace; font-size:13px;
  outline:none; transition:border-color 0.2s; width:100%;
}
.f-input:focus { border-color:var(--accent); }
.color-row { display:flex; gap:7px; flex-wrap:wrap; }
.cswatch {
  width:24px; height:24px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.2s,border-color 0.2s;
}
.cswatch:hover { transform:scale(1.15); }
.cswatch.sel { border-color:var(--text); }
.btn-add {
  align-self:flex-start; background:var(--accent); color:var(--bg); border:none;
  padding:9px 22px; border-radius:7px;
  font-family:'Courier New',monospace; font-size:11px; font-weight:500; letter-spacing:0.1em;
  cursor:pointer; transition:opacity 0.2s;
}
.btn-add:hover { opacity:0.8; }

.setting-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0; border-bottom:1px solid var(--border);
}
.setting-row:last-child { border-bottom:none; }
.sr-label { font-size:13px; }
.sr-sub { font-size:10px; color:var(--dim); letter-spacing:0.06em; margin-top:2px; }

.toggle {
  width:40px; height:22px; background:var(--border); border-radius:11px;
  cursor:pointer; position:relative; transition:background 0.3s; flex-shrink:0;
}
.toggle::after {
  content:''; position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%; background:var(--dim); transition:all 0.3s;
}
.toggle.on { background:rgba(200,184,122,0.2); }
.toggle.on::after { left:21px; background:var(--accent); }

.num-input {
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; color:var(--text); font-family:'Courier New',monospace;
  font-size:13px; outline:none; width:60px; text-align:center; transition:border-color 0.2s;
}
.num-input:focus { border-color:var(--accent); }

/* Sound list */
.sound-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer;
}
.sound-item:last-child { border-bottom:none; }
.sound-item-left { display:flex; flex-direction:column; gap:2px; }
.sound-name { font-size:13px; }
.sound-desc { font-size:10px; color:var(--dim); letter-spacing:0.06em; }
.sound-right { display:flex; align-items:center; gap:10px; }
.check-mark { color:var(--accent); font-size:14px; opacity:0; transition:opacity 0.2s; }
.check-mark.visible { opacity:1; }
.preview-btn {
  background:none; border:1px solid var(--border); color:var(--dim);
  width:28px; height:28px; border-radius:50%; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.preview-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── EDIT MODAL ── */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.modal-bg.open { opacity:1; pointer-events:all; }
.modal {
  background:#111; border:1px solid var(--border); border-radius:14px;
  padding:26px; width:min(440px,88vw);
  transform:translateY(18px); transition:transform 0.3s;
  display:flex; flex-direction:column; gap:14px;
}
.modal-bg.open .modal { transform:translateY(0); }
.modal-title { font-family:Georgia,serif; font-style:italic; font-size:22px; font-weight:300; margin-bottom:4px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }
.btn-ghost {
  background:none; border:1px solid var(--border); color:var(--dim);
  padding:8px 18px; border-radius:7px;
  font-family:'Courier New',monospace; font-size:11px; cursor:pointer; transition:all 0.2s;
}
.btn-ghost:hover { border-color:var(--dim); color:var(--text); }

/* ── TOAST ── */
#toast {
  position:fixed; top:72px; left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:#1a1a1a; border:1px solid var(--border); border-radius:10px;
  padding:11px 22px; font-size:12px; letter-spacing:0.08em; color:var(--mid);
  opacity:0; transition:all 0.35s; z-index:300; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div id="amb"><div class="orb o1" id="o1"></div><div class="orb o2" id="o2"></div></div>

<div id="topbar">
  <button class="btn-pill" onclick="openSettings()">⊹ 编辑日程</button>
</div>

<div id="main">
  <div id="countdown">--:--</div>
  <div id="session-range">— 无日程 —</div>
  <div id="label-wrap"></div>
</div>

<div id="break-overlay">
  <div class="break-emoji">🧘</div>
  <div class="break-title">起来活动一下</div>
  <div class="break-sub">久坐伤身 · 站起来伸展一下吧</div>
  <button class="btn-dismiss" onclick="dismissBreak()">好的，继续</button>
</div>

<div id="trans-overlay">
  <div class="trans-sub">现在开始</div>
  <div class="trans-label" id="trans-label"></div>
</div>

<div id="settings">
  <div class="sp-head">
    <div class="sp-title">日程管理</div>
    <button class="btn-x" onclick="closeSettings()">×</button>
  </div>
  <div class="sp-body">
    <div class="sp-sec">今日日程</div>
    <div id="session-list"></div>

    <div class="sp-sec">添加时间段</div>
    <div class="add-form">
      <div class="f-row">
        <div class="f-group"><div class="f-label">开始</div><input type="time" class="f-input" id="inStart" value="09:00"></div>
        <div class="f-group"><div class="f-label">结束</div><input type="time" class="f-input" id="inEnd" value="10:00"></div>
      </div>
      <div class="f-group"><div class="f-label">标签</div><input type="text" class="f-input" id="inLabel" placeholder="IELTS Time / Work Time…" maxlength="28"></div>
      <div class="f-group"><div class="f-label">颜色</div><div class="color-row" id="addColorRow"></div></div>
      <button class="btn-add" onclick="addSession()">+ 添加</button>
    </div>

    <div class="sp-sec">切换 &amp; 提醒音效</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 18px;">
      <div id="sound-list"></div>
    </div>

    <div class="sp-sec">提醒设置</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 18px;">
      <div class="setting-row">
        <div><div class="sr-label">起立提醒</div><div class="sr-sub">定时提醒起来活动</div></div>
        <div class="toggle on" id="tgl-break" onclick="togglePref('breakOn')"></div>
      </div>
      <div class="setting-row">
        <div><div class="sr-label">提醒间隔（分钟）</div></div>
        <input type="number" class="num-input" id="inInterval" value="29" min="5" max="120">
      </div>
      <div class="setting-row">
        <div><div class="sr-label">时间段切换提示</div><div class="sr-sub">切换时全屏提示</div></div>
        <div class="toggle on" id="tgl-trans" onclick="togglePref('transOn')"></div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title">编辑时间段</div>
    <div class="f-row">
      <div class="f-group"><div class="f-label">开始</div><input type="time" class="f-input" id="editStart"></div>
      <div class="f-group"><div class="f-label">结束</div><input type="time" class="f-input" id="editEnd"></div>
    </div>
    <div class="f-group"><div class="f-label">标签</div><input type="text" class="f-input" id="editLabel" maxlength="28"></div>
    <div class="f-group"><div class="f-label">颜色</div><div class="color-row" id="editColorRow"></div></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEditModal()">取消</button>
      <button class="btn-add" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const COLORS = ['#C8B87A','#7AB4E8','#C87AE8','#7AE8A4','#E8A07A','#E87A7A','#7AE8D4','#E8E87A','#B0B0B0','#E87AB4'];

const SOUNDS = [
  { id:'none',    name:'无声',   desc:'静音',         freq:0,   type:'none' },
  { id:'sms',     name:'消息',   desc:'短信提示音',   freq:523,  type:'ping',   dur:0.3 },
  { id:'cal',     name:'日历',   desc:'日历提醒音',   freq:440,  type:'bowl',   dur:2.5 },
  { id:'mail',    name:'邮件',   desc:'邮件发送音',   freq:880,  type:'ping',   dur:0.2 },
  { id:'ding',    name:'叮',     desc:'清脆单音',     freq:1047, type:'ping',   dur:0.4 },
  { id:'shutter', name:'相机',   desc:'快门声',       freq:200,  type:'click',  dur:0.05 },
  { id:'chime',   name:'叮咚',   desc:'双音提示',     freq:659,  type:'chime',  dur:1.0 },
  { id:'soft',    name:'轻柔',   desc:'柔和提示',     freq:330,  type:'soft',   dur:0.8 },
  { id:'low',     name:'低音',   desc:'低沉提示',     freq:110,  type:'bowl',   dur:3.0 },
  { id:'triple',  name:'三连音', desc:'上行三音',     freq:392,  type:'triple', dur:1.5 },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  sessions: [],
  prefs: { breakOn:true, transOn:true, interval:29, soundId:'cal' },
  addColor: COLORS[0],
  editColor: COLORS[0],
  editIdx: -1,
  lastBreakTime: Date.now(),
  lastActiveKey: '__init__',
};

// ═══════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════
function save() {
  try { localStorage.setItem('pomo_final', JSON.stringify({ sessions:state.sessions, prefs:state.prefs })); } catch(e){}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('pomo_final')||'{}');
    if (d.sessions) state.sessions = d.sessions;
    if (d.prefs) state.prefs = {...state.prefs, ...d.prefs};
  } catch(e){}
  if (!state.sessions.length) {
    state.sessions = [
      {start:'09:00',end:'11:30',label:'IELTS Time', color:'#C87AE8'},
      {start:'11:30',end:'12:00',label:'Break',       color:'#7AE8A4'},
      {start:'12:00',end:'14:00',label:'Work Time',   color:'#C8B87A'},
      {start:'14:00',end:'14:30',label:'Lunch',       color:'#E8A07A'},
      {start:'14:30',end:'17:30',label:'Deep Work',   color:'#7AB4E8'},
      {start:'17:30',end:'18:00',label:'Wind Down',   color:'#B0B0B0'},
    ];
  }
}

// ═══════════════════════════════════════
// UTC+8 TIME
// ═══════════════════════════════════════
function bjDate() {
  const now = new Date();
  return new Date(now.getTime() + (8*3600 + now.getTimezoneOffset()*60)*1000);
}
function bjMins() { const d=bjDate(); return d.getHours()*60+d.getMinutes(); }
function bjSecs() { const d=bjDate(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function t2m(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function pad2(n) { return String(n).padStart(2,'0'); }
function fmtTime(t) { const [h,m]=t.split(':').map(Number); return `${pad2(h)}:${pad2(m)}`; }
function fmtRange(s,e) { return `${fmtTime(s)}  —  ${fmtTime(e)}`; }

// ═══════════════════════════════════════
// SESSION HELPERS
// ═══════════════════════════════════════
function activeSession() {
  const now = bjMins();
  return state.sessions.find(s=>now>=t2m(s.start)&&now<t2m(s.end));
}
function nextSession() {
  const now = bjMins();
  return state.sessions.filter(s=>t2m(s.start)>now).sort((a,b)=>t2m(a.start)-t2m(b.start))[0];
}

// ═══════════════════════════════════════
// AUDIO — Web Audio synthesis
// ═══════════════════════════════════════
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  return actx;
}

function playSound(soundId) {
  const s = SOUNDS.find(x=>x.id===soundId);
  if (!s || s.type==='none') return;
  try {
    const ctx = getCtx();
    if (s.type==='ping') {
      _osc(ctx, s.freq, s.dur, 0.22, 'sine');
    } else if (s.type==='bowl') {
      _osc(ctx, s.freq, s.dur, 0.18, 'sine');
      _osc(ctx, s.freq*2.756, s.dur*0.7, 0.07, 'sine');
      _osc(ctx, s.freq*5.4, s.dur*0.4, 0.025, 'sine');
    } else if (s.type==='click') {
      // noise burst
      const buf = ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*0.1));
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain(); g.gain.value = 0.3;
      src.connect(g); g.connect(ctx.destination); src.start();
    } else if (s.type==='chime') {
      _osc(ctx, s.freq, s.dur, 0.18, 'sine');
      setTimeout(()=>_osc(ctx, s.freq*1.5, s.dur*0.8, 0.14, 'sine'), 180);
    } else if (s.type==='soft') {
      _osc(ctx, s.freq, s.dur, 0.12, 'sine');
      _osc(ctx, s.freq*2, s.dur*0.6, 0.05, 'sine');
    } else if (s.type==='triple') {
      [s.freq, s.freq*5/4, s.freq*3/2].forEach((f,i)=>setTimeout(()=>_osc(ctx,f,0.6,0.16,'sine'),i*320));
    }
  } catch(e){}
}

function _osc(ctx, freq, dur, vol, type) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime); o.stop(ctx.currentTime+dur);
}

// ═══════════════════════════════════════
// FLOATING LABEL
// ═══════════════════════════════════════
let charAnimations = [];

function setLabel(text, color) {
  const wrap = document.getElementById('label-wrap');
  // Clear old
  charAnimations.forEach(a=>cancelAnimationFrame(a));
  charAnimations = [];
  wrap.innerHTML = '';

  [...text].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'fl-char';
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.color = color;
    wrap.appendChild(span);

    // Per-character noise float
    const dur    = 2400 + (i % 5) * 370;   // ms
    const ampY   = 6 + (i % 4) * 3;
    const ampX   = (i % 3) * 1.5;
    const delay  = i * 180;
    const phaseY = Math.random() * Math.PI * 2;
    const phaseX = Math.random() * Math.PI * 2;
    const start  = performance.now() - delay;

    function animate(now) {
      const t = (now - start) / dur;
      const y = Math.sin(t * Math.PI * 2 + phaseY) * ampY;
      const x = Math.sin(t * Math.PI * 2 * 0.77 + phaseX) * ampX;
      span.style.transform = `translate(${x}px,${y}px)`;
      charAnimations.push(requestAnimationFrame(animate));
    }
    charAnimations.push(requestAnimationFrame(animate));
  });
}

function updateLabelColor(color) {
  document.querySelectorAll('.fl-char').forEach(el => el.style.color = color);
}

// ═══════════════════════════════════════
// CLOCK TICK
// ═══════════════════════════════════════
let prevLabel = '';
let prevColor = '';

function tick() {
  const bj = bjDate();
  const active = activeSession();
  const next   = nextSession();

  // Countdown / clock
  const cdEl = document.getElementById('countdown');
  if (active) {
    const rem = Math.max(0, t2m(active.end)*60 - bjSecs());
    const hh  = Math.floor(rem/3600);
    const mm  = Math.floor((rem%3600)/60);
    const ss  = rem%60;
    cdEl.textContent = hh > 0
      ? `${pad2(hh)}:${pad2(mm)}:${pad2(ss)}`
      : `${pad2(mm)}:${pad2(ss)}`;
  } else {
    cdEl.textContent = `${pad2(bj.getHours())}:${pad2(bj.getMinutes())}:${pad2(bj.getSeconds())}`;
  }

  // Session range + label
  let label, color, range;
  if (active) {
    label = active.label;
    color = active.color;
    range = fmtRange(active.start, active.end);
  } else {
    label = '休息一下~';
    color = '#888888';
    range = next ? fmtRange(next.start, next.end) : '— 今日日程已完成 —';
  }

  document.getElementById('session-range').textContent = range;
  document.getElementById('session-range').style.color = color;

  // Detect change
  const key = active ? (active.start+active.end) : 'idle';
  if (key !== state.lastActiveKey) {
    if (state.lastActiveKey !== '__init__') {
      // Transition flash
      if (state.prefs.transOn && active) {
        const tl = document.getElementById('trans-label');
        tl.textContent = active.label;
        tl.style.color = active.color;
        document.getElementById('trans-overlay').classList.add('show');
        setTimeout(()=>document.getElementById('trans-overlay').classList.remove('show'), 2800);
      }
      // Sound
      playSound(state.prefs.soundId);
    }
    state.lastActiveKey = key;
  }

  // Update label & color if changed
  if (label !== prevLabel) {
    prevLabel = label;
    setLabel(label, color);
    setAmbient(color);
  } else if (color !== prevColor) {
    updateLabelColor(color);
    setAmbient(color);
  }
  prevColor = color;

  // Break reminder
  if (state.prefs.breakOn && active) {
    if (Date.now() - state.lastBreakTime >= state.prefs.interval*60000) {
      state.lastBreakTime = Date.now();
      playSound(state.prefs.soundId);
      document.getElementById('break-overlay').classList.add('show');
      if (navigator.vibrate) navigator.vibrate([300,150,300]);
    }
  }
}

function setAmbient(color) {
  document.getElementById('o1').style.background = color;
  document.getElementById('o2').style.background = color;
}

function dismissBreak() {
  state.lastBreakTime = Date.now();
  document.getElementById('break-overlay').classList.remove('show');
}

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function openSettings() {
  renderSessionList();
  renderSoundList();
  renderColorRow('addColorRow', state.addColor, c=>{state.addColor=c; renderColorRow('addColorRow',c,arguments.callee);});
  document.getElementById('inInterval').value = state.prefs.interval;
  syncToggles();
  document.getElementById('settings').classList.add('open');
}

function closeSettings() {
  state.prefs.interval = parseInt(document.getElementById('inInterval').value)||29;
  save();
  document.getElementById('settings').classList.remove('open');
}

function syncToggles() {
  document.getElementById('tgl-break').className = 'toggle'+(state.prefs.breakOn?' on':'');
  document.getElementById('tgl-trans').className  = 'toggle'+(state.prefs.transOn?' on':'');
}

function togglePref(key) {
  state.prefs[key] = !state.prefs[key];
  syncToggles(); save();
}

// ═══════════════════════════════════════
// SOUND LIST
// ═══════════════════════════════════════
function renderSoundList() {
  const el = document.getElementById('sound-list');
  el.innerHTML = '';
  SOUNDS.forEach(s => {
    const row = document.createElement('div');
    row.className = 'sound-item';
    row.innerHTML = `
      <div class="sound-item-left">
        <div class="sound-name">${s.name}</div>
        <div class="sound-desc">${s.desc}</div>
      </div>
      <div class="sound-right">
        <span class="check-mark ${state.prefs.soundId===s.id?'visible':''}">✓</span>
        ${s.type!=='none'?`<button class="preview-btn" onclick="event.stopPropagation();playSound('${s.id}')">▶</button>`:''}
      </div>`;
    row.onclick = () => {
      state.prefs.soundId = s.id;
      save();
      renderSoundList();
    };
    el.appendChild(row);
  });
}

// ═══════════════════════════════════════
// COLOR PICKER
// ═══════════════════════════════════════
function renderColorRow(id, selected, onPick) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'cswatch'+(c===selected?' sel':'');
    sw.style.background = c;
    sw.onclick = () => onPick(c);
    el.appendChild(sw);
  });
}

// ═══════════════════════════════════════
// SESSION CRUD
// ═══════════════════════════════════════
function renderSessionList() {
  const list = document.getElementById('session-list');
  const sorted = [...state.sessions].sort((a,b)=>t2m(a.start)-t2m(b.start));
  list.innerHTML = '';
  if (!sorted.length) {
    list.innerHTML='<div style="color:var(--dim);font-size:12px;padding:16px 0;text-align:center;letter-spacing:0.1em;">暂无日程</div>';
    return;
  }
  sorted.forEach(s => {
    const ri = state.sessions.indexOf(s);
    const card = document.createElement('div');
    card.className = 's-card';
    card.innerHTML = `
      <div class="s-dot" style="background:${s.color}"></div>
      <div class="s-info">
        <div class="s-name">${s.label}</div>
        <div class="s-time">${fmtTime(s.start)} → ${fmtTime(s.end)}</div>
      </div>
      <div class="s-btns">
        <button class="s-btn edit" onclick="openEditModal(${ri})">✎</button>
        <button class="s-btn" onclick="deleteSession(${ri})">✕</button>
      </div>`;
    list.appendChild(card);
  });
}

function addSession() {
  const start=document.getElementById('inStart').value;
  const end=document.getElementById('inEnd').value;
  const label=document.getElementById('inLabel').value.trim();
  if (!start||!end||!label){showToast('请填写完整');return;}
  if (t2m(start)>=t2m(end)){showToast('结束须晚于开始');return;}
  state.sessions.push({start,end,label,color:state.addColor});
  document.getElementById('inLabel').value='';
  save(); renderSessionList(); showToast('已添加：'+label);
}

function deleteSession(idx) {
  state.sessions.splice(idx,1); save(); renderSessionList();
}

function openEditModal(idx) {
  state.editIdx=idx;
  const s=state.sessions[idx];
  document.getElementById('editStart').value=s.start;
  document.getElementById('editEnd').value=s.end;
  document.getElementById('editLabel').value=s.label;
  state.editColor=s.color;
  renderColorRow('editColorRow',state.editColor,c=>{state.editColor=c;renderColorRow('editColorRow',c,arguments.callee);});
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  state.editIdx=-1;
}

function saveEdit() {
  if (state.editIdx<0) return;
  const start=document.getElementById('editStart').value;
  const end=document.getElementById('editEnd').value;
  const label=document.getElementById('editLabel').value.trim();
  if (!start||!end||!label){showToast('请填写完整');return;}
  state.sessions[state.editIdx]={start,end,label,color:state.editColor};
  save(); renderSessionList(); closeEditModal(); showToast('已保存');
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let _tt;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400);
}

// ═══════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════
async function wakeLock() {
  try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') wakeLock(); });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
load();
const initActive = activeSession() || nextSession();
if (initActive) {
  const color = activeSession() ? initActive.color : '#888888';
  const label = activeSession() ? initActive.label : '休息一下~';
  setLabel(label, color);
  setAmbient(color);
  prevLabel = label;
  prevColor = color;
} else {
  setLabel('休息一下~','#888888');
  prevLabel='休息一下~'; prevColor='#888888';
}

tick();
setInterval(tick, 1000);
wakeLock();
</script>
